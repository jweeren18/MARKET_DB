name: Daily Market Pipeline

on:
  schedule:
    - cron: "0 21 * * 1-5"   # 4:00 PM ET Mon-Fri (21:00 UTC)
  workflow_dispatch:           # allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-jobs.txt

      - run: pip install -r backend/requirements-jobs.txt

      - run: python backend/jobs/run_pipeline.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          SCHWAB_API_KEY: ${{ secrets.SCHWAB_API_KEY }}
          SCHWAB_API_SECRET: ${{ secrets.SCHWAB_API_SECRET }}
          SCHWAB_TOKENS_JSON: ${{ secrets.SCHWAB_TOKENS_JSON }}
          SCHWAB_CALLBACK_URL: ${{ secrets.SCHWAB_CALLBACK_URL }}
          ENV: production
