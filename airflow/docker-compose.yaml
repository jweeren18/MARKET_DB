# Docker Compose for Airflow 3 local development
#
# Start:   cd airflow && docker compose up -d
# UI:      http://localhost:8080  (user: airflow / pass: airflow)
# Logs:    docker compose logs -f airflow-scheduler
# Stop:    docker compose down

x-airflow-common:
  &airflow-common
  image: apache/airflow:3.1.6-python3.10
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Airflow 3: scheduler talks to api-server for task execution
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-api-server:8080/execution/'
    # K8s provider (so the production DAG parses) + backend job deps (so local
    # DAG task callables can import app.* and jobs.* at runtime).
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      apache-airflow-providers-cncf-kubernetes>=10.0.0
      sqlalchemy>=2.0.25
      psycopg2-binary>=2.9.9
      pydantic>=2.6.0
      pydantic-settings>=2.1.0
      python-dotenv>=1.0.1
      httpx>=0.26.0
      pandas>=2.2.0
      numpy>=1.26.0
      ta>=0.11.0
    # Backend is volume-mounted at /opt/airflow/backend — put it on PYTHONPATH so
    # "from app.*" and "from jobs.*" imports resolve in all Airflow processes.
    PYTHONPATH: /opt/airflow/backend
    # App database — points at the host's TimescaleDB (port 5433).
    # host.docker.internal resolves to the Docker Desktop host (Windows/Mac).
    DATABASE_URL: postgresql://postgres:password@host.docker.internal:5433/market_intelligence
  # Pull SCHWAB_API_KEY / SCHWAB_API_SECRET (and other app vars) from the
  # project-root .env.  Explicit environment: entries above take precedence,
  # so DATABASE_URL correctly uses host.docker.internal instead of 127.0.0.1.
  env_file:
    - ../.env
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./config:/opt/airflow/config
    # Mount backend/ so local DAGs can resolve app.* and jobs.* imports at runtime
    - ../backend:/opt/airflow/backend
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    ports:
      - "5434:5432"  # Different port to avoid conflict with main DB (5432) and TimescaleDB (5433)

  # ---------------------------------------------------------------------------
  # Airflow 3 services
  # ---------------------------------------------------------------------------

  airflow-api-server:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/{logs,dags,plugins}
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      # Init runs as root; the entrypoint refuses pip as root.  It only needs
      # DB migrate + version — no backend deps required.
      _PIP_ADDITIONAL_REQUIREMENTS: ''
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: "0:0"

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow

volumes:
  postgres-db-volume:
